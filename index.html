<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>КРЕСТИКИ-НОЛИКИ // CYBERPUNK</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

    :root {
      --cyan:    #00f5ff;
      --magenta: #ff00a0;
      --yellow:  #f5e642;
      --dark:    #050510;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--dark);
      color: var(--cyan);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      overflow-y: auto;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 20px 20px max(40px, env(safe-area-inset-bottom, 20px)) 20px;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(1.4rem, 5vw, 2.6rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--cyan);
      text-shadow: 0 0 8px var(--cyan), 0 0 24px var(--cyan), 0 0 60px rgba(0,245,255,0.4);
      animation: glitch 6s infinite;
    }

    @keyframes glitch {
      0%, 94%, 100% { transform: none; text-shadow: 0 0 8px var(--cyan), 0 0 24px var(--cyan), 0 0 60px rgba(0,245,255,0.4); }
      95%  { transform: translate(-3px,0) skewX(-2deg); text-shadow: -3px 0 var(--magenta), 3px 0 var(--yellow); }
      96%  { transform: translate(3px,0) skewX(2deg);  text-shadow:  3px 0 var(--magenta),-3px 0 var(--yellow); }
      97%  { transform: none; }
      98%  { transform: translate(-2px,1px); text-shadow: -2px 0 var(--magenta); }
      99%  { transform: none; }
    }

    /* ---- Control rows ---- */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .btn-row { display: flex; gap: 8px; }

    .ctrl-btn {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #555a8a;
      background: transparent;
      border: 1px solid #2a2a4a;
      padding: 7px 16px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .ctrl-btn:hover:not(.active) { color: #8888bb; border-color: #3a3a6a; }

    .ctrl-btn.active          { color: var(--cyan);    border-color: var(--cyan);    box-shadow: 0 0 10px rgba(0,245,255,0.25); }
    .ctrl-btn.active.green    { color: #39ff14;        border-color: #39ff14;        box-shadow: 0 0 10px rgba(57,255,20,0.25); }
    .ctrl-btn.active.red      { color: var(--magenta); border-color: var(--magenta); box-shadow: 0 0 10px rgba(255,0,160,0.25); }
    .ctrl-btn.active.yellow   { color: var(--yellow);  border-color: var(--yellow);  box-shadow: 0 0 10px rgba(245,230,66,0.25); }

    .hidden { display: none !important; }

    /* ---- Score ---- */
    .score {
      display: flex;
      gap: 32px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
    }

    .score-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .score-label { color: #555a8a; font-size: 0.7rem; }
    .score-x .score-val { color: var(--magenta); text-shadow: 0 0 12px var(--magenta); }
    .score-o .score-val { color: var(--yellow);  text-shadow: 0 0 12px var(--yellow); }
    .score-d .score-val { color: #555a8a; }
    .score-val { font-size: 1.6rem; font-weight: 700; }

    /* ---- Status ---- */
    .status {
      font-size: 1rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      min-height: 1.4em;
      transition: color 0.3s;
    }
    .status.x-turn { color: var(--magenta); text-shadow: 0 0 10px var(--magenta); }
    .status.o-turn { color: var(--yellow);  text-shadow: 0 0 10px var(--yellow); }
    .status.draw   { color: #888; }
    .status.x-win  { color: var(--magenta); text-shadow: 0 0 16px var(--magenta), 0 0 40px var(--magenta); animation: pulse .6s infinite alternate; }
    .status.o-win  { color: var(--yellow);  text-shadow: 0 0 16px var(--yellow),  0 0 40px var(--yellow);  animation: pulse .6s infinite alternate; }

    @keyframes pulse { from { opacity:1; } to { opacity:.6; } }

    /* ---- Board ---- */
    .board {
      display: grid;
      gap: 5px;
      padding: 5px;
      background: rgba(0,245,255,0.06);
      border: 1px solid rgba(0,245,255,0.2);
      box-shadow: 0 0 20px rgba(0,245,255,0.1), inset 0 0 20px rgba(0,0,0,0.5);
      transition: opacity 0.2s;
    }

    .board.size-3 { grid-template-columns: repeat(3, 1fr); }
    .board.size-5 { grid-template-columns: repeat(5, 1fr); }
    .board.thinking { opacity: 0.65; pointer-events: none; }

    .cell {
      background: rgba(10,10,30,0.8);
      border: 1px solid rgba(0,245,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      position: relative;
      overflow: hidden;
      user-select: none;
    }

    .board.size-3 .cell { width: clamp(88px,22vw,128px); height: clamp(88px,22vw,128px); font-size: clamp(2rem,8vw,3.4rem); }
    .board.size-5 .cell { width: clamp(58px,13vw,82px);  height: clamp(58px,13vw,82px);  font-size: clamp(1.2rem,4vw,2rem); }

    .cell::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 60%, rgba(0,245,255,0.04));
      opacity: 0;
      transition: opacity 0.2s;
    }

    .cell:hover:not(.taken) { background: rgba(0,245,255,0.06); border-color: rgba(0,245,255,0.4); }
    .cell:hover:not(.taken)::before { opacity: 1; }
    .cell.taken { cursor: default; }

    .cell.x { color: var(--magenta); text-shadow: 0 0 12px var(--magenta), 0 0 30px rgba(255,0,160,0.5); }
    .cell.o { color: var(--yellow);  text-shadow: 0 0 12px var(--yellow),  0 0 30px rgba(245,230,66,0.5); }

    .cell.win-cell.x { background: rgba(255,0,160,0.1); border-color: var(--magenta); box-shadow: inset 0 0 20px rgba(255,0,160,0.15), 0 0 12px rgba(255,0,160,0.3); animation: win-flash .4s ease-out; }
    .cell.win-cell.o { background: rgba(245,230,66,0.1); border-color: var(--yellow);  box-shadow: inset 0 0 20px rgba(245,230,66,0.15), 0 0 12px rgba(245,230,66,0.3); animation: win-flash .4s ease-out; }

    @keyframes win-flash { from { opacity:0; transform:scale(.85); } to { opacity:1; transform:scale(1); } }
    .cell.pop { animation: pop .2s ease-out; }
    @keyframes pop { 0%{transform:scale(.5);opacity:.4;} 80%{transform:scale(1.08);} 100%{transform:scale(1);opacity:1;} }

    /* ---- Restart button ---- */
    .btn {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--cyan);
      background: transparent;
      border: 1px solid var(--cyan);
      padding: 10px 32px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: color 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 8px rgba(0,245,255,0.2), inset 0 0 8px rgba(0,245,255,0.05);
    }

    .btn::before {
      content: '';
      position: absolute;
      top:0; left:-100%;
      width:100%; height:100%;
      background: linear-gradient(90deg, transparent, rgba(0,245,255,0.12), transparent);
      transition: left 0.4s;
    }

    .btn:hover { color:#fff; box-shadow: 0 0 16px rgba(0,245,255,0.5), inset 0 0 16px rgba(0,245,255,0.1); }
    .btn:hover::before { left:100%; }
    .btn:active { transform:scale(.97); }

    .footer { font-size:.65rem; color:#2a2a4a; letter-spacing:.1em; text-transform:uppercase; }

  </style>
</head>
<body>
  <div class="container">
    <h1>X // O &nbsp; CYBERPUNK</h1>

    <div class="controls">
      <!-- Opponent -->
      <div class="btn-row">
        <button class="ctrl-btn active" id="mode-pvp">2 ИГРОКА</button>
        <button class="ctrl-btn" id="mode-ai">VS КОМПЬЮТЕР</button>
      </div>
      <!-- Board size -->
      <div class="btn-row">
        <button class="ctrl-btn active yellow" id="size-3">3×3 // 3 В РЯД</button>
        <button class="ctrl-btn yellow" id="size-5">5×5 // 4 В РЯД</button>
      </div>
      <!-- Difficulty (AI only) -->
      <div class="btn-row hidden" id="diff-row">
        <button class="ctrl-btn active green" id="diff-easy">ЛЕГКО</button>
        <button class="ctrl-btn red" id="diff-hard">СЛОЖНО</button>
      </div>
    </div>

    <div class="score">
      <div class="score-item score-x">
        <span class="score-label" id="label-x">ИГРОК X</span>
        <span class="score-val" id="score-x">0</span>
      </div>
      <div class="score-item score-d">
        <span class="score-label">НИЧЬЯ</span>
        <span class="score-val" id="score-d">0</span>
      </div>
      <div class="score-item score-o">
        <span class="score-label" id="label-o">ИГРОК O</span>
        <span class="score-val" id="score-o">0</span>
      </div>
    </div>

    <div class="status x-turn" id="status">ХОД ИГРОКА X</div>

    <div class="board size-3" id="board"></div>

    <button class="btn" id="restart">[ НОВАЯ ИГРА ]</button>

    <div class="footer">// НАЖМИТЕ НА КЛЕТКУ ЧТОБЫ СДЕЛАТЬ ХОД //</div>
  </div>


  <script>
    // ── State ──────────────────────────────────────────────────────────────
    let SIZE = 3, WIN_LEN = 3;
    let board, current, over;
    let vsAI = false, hardMode = false;
    let scores = {X:0, O:0, D:0};

    const statusEl = document.getElementById('status');
    const boardEl  = document.getElementById('board');
    const labelX   = document.getElementById('label-x');
    const labelO   = document.getElementById('label-o');
    const diffRow  = document.getElementById('diff-row');

    // ── Controls ───────────────────────────────────────────────────────────
    function setActive(groupIds, activeId) {
      groupIds.forEach(id => {
        const el = document.getElementById(id);
        el.classList.toggle('active', id === activeId);
      });
    }

    document.getElementById('mode-pvp').addEventListener('click', () => {
      vsAI = false;
      scores = {X:0,O:0,D:0}; updateScores();
      setActive(['mode-pvp','mode-ai'], 'mode-pvp');
      diffRow.classList.add('hidden');
      labelX.textContent = 'ИГРОК X';
      labelO.textContent = 'ИГРОК O';
      init();
    });

    document.getElementById('mode-ai').addEventListener('click', () => {
      vsAI = true;
      scores = {X:0,O:0,D:0}; updateScores();
      setActive(['mode-pvp','mode-ai'], 'mode-ai');
      diffRow.classList.remove('hidden');
      labelX.textContent = 'ВЫ (X)';
      labelO.textContent = 'КОМПЬЮТЕР';
      init();
    });

    document.getElementById('size-3').addEventListener('click', () => {
      if (SIZE === 3) return;
      SIZE = 3; WIN_LEN = 3;
      scores = {X:0,O:0,D:0}; updateScores();
      setActive(['size-3','size-5'], 'size-3');
      init();
    });

    document.getElementById('size-5').addEventListener('click', () => {
      if (SIZE === 5) return;
      SIZE = 5; WIN_LEN = 4;
      scores = {X:0,O:0,D:0}; updateScores();
      setActive(['size-3','size-5'], 'size-5');
      init();
    });

    document.getElementById('diff-easy').addEventListener('click', () => {
      hardMode = false;
      scores = {X:0,O:0,D:0}; updateScores();
      document.getElementById('diff-easy').classList.add('active');
      document.getElementById('diff-hard').classList.remove('active');
      init();
    });

    document.getElementById('diff-hard').addEventListener('click', () => {
      hardMode = true;
      scores = {X:0,O:0,D:0}; updateScores();
      document.getElementById('diff-hard').classList.add('active');
      document.getElementById('diff-easy').classList.remove('active');
      init();
    });

    document.getElementById('restart').addEventListener('click', init);

    // ── Board init ─────────────────────────────────────────────────────────
    function init() {
      board   = Array(SIZE * SIZE).fill(null);
      current = 'X';
      over    = false;
      boardEl.className = `board size-${SIZE}`;

      boardEl.innerHTML = '';
      for (let i = 0; i < SIZE * SIZE; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.i = i;
        cell.addEventListener('click', handleClick);
        boardEl.appendChild(cell);
      }

      setStatus('turn');
    }

    function cells() { return boardEl.querySelectorAll('.cell'); }

    // ── Status ─────────────────────────────────────────────────────────────
    function setStatus(type, winner) {
      const name = p => (vsAI && p === 'O') ? 'КОМПЬЮТЕР' : `ИГРОК ${p}`;
      const map = {
        turn:     () => ({ cls: current==='X' ? 'x-turn':'o-turn', txt: `ХОД: ${name(current)}` }),
        thinking: () => ({ cls: 'o-turn', txt: 'КОМПЬЮТЕР ДУМАЕТ...' }),
        win:      () => ({ cls: winner==='X' ? 'x-win':'o-win',    txt: `ПОБЕДА: ${name(winner)}!` }),
        draw:     () => ({ cls: 'draw', txt: '// НИЧЬЯ //' }),
      };
      const {cls,txt} = map[type]();
      statusEl.className = `status ${cls}`;
      statusEl.textContent = txt;
    }

    // ── Win detection ──────────────────────────────────────────────────────
    const DIRS = [[0,1],[1,0],[1,1],[1,-1]];

    function checkWin(b) {
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const p = b[r*SIZE+c];
          if (!p) continue;
          for (const [dr,dc] of DIRS) {
            const line = [];
            for (let k = 0; k < WIN_LEN; k++) {
              const nr = r+dr*k, nc = c+dc*k;
              if (nr<0||nr>=SIZE||nc<0||nc>=SIZE||b[nr*SIZE+nc]!==p) break;
              line.push(nr*SIZE+nc);
            }
            if (line.length === WIN_LEN) return { winner: p, line };
          }
        }
      }
      return null;
    }

    // ── Move helpers ───────────────────────────────────────────────────────
    function placeMove(i, player) {
      board[i] = player;
      const cell = boardEl.querySelector(`[data-i="${i}"]`);
      cell.textContent = player;
      cell.classList.add('taken', player.toLowerCase(), 'pop');
    }

    function finishTurn() {
      const result = checkWin(board);
      if (result) {
        over = true;
        scores[result.winner]++;
        updateScores();
        result.line.forEach(idx => {
          boardEl.querySelector(`[data-i="${idx}"]`).classList.add('win-cell');
        });
        setStatus('win', result.winner);
        return true;
      }
      if (board.every(Boolean)) {
        over = true; scores.D++; updateScores();
        setStatus('draw'); return true;
      }
      return false;
    }

    function handleClick(e) {
      const i = +e.currentTarget.dataset.i;
      if (over || board[i]) return;
      placeMove(i, 'X');
      if (finishTurn()) return;
      current = 'O';
      if (vsAI) {
        boardEl.classList.add('thinking');
        setStatus('thinking');
        setTimeout(aiMove, SIZE === 5 ? 300 : 420);
      } else {
        setStatus('turn');
      }
    }

    function aiMove() {
      boardEl.classList.remove('thinking');
      const i = hardMode ? bestMoveHard() : bestMoveEasy();
      placeMove(i, 'O');
      if (!finishTurn()) { current = 'X'; setStatus('turn'); }
    }

    // ── Easy AI ────────────────────────────────────────────────────────────
    function bestMoveEasy() {
      const empty = board.map((v,i) => v==null ? i : null).filter(i => i!==null);
      for (const i of empty) {
        board[i]='O'; if (checkWin(board)) { board[i]=null; return i; } board[i]=null;
      }
      for (const i of empty) {
        board[i]='X'; if (checkWin(board)) { board[i]=null; return i; } board[i]=null;
      }
      return empty[Math.floor(Math.random()*empty.length)];
    }

    // ── Hard AI ────────────────────────────────────────────────────────────
    // 3×3: perfect minimax | 5×5: minimax + alpha-beta, depth 4
    function bestMoveHard() {
      const maxDepth = SIZE === 3 ? 9 : 4;
      let best = -Infinity, move = -1;
      const empty = board.map((v,i) => v==null ? i : null).filter(i => i!==null);
      // try center/near-center first for better pruning
      empty.sort((a,b) => centerScore(b) - centerScore(a));
      for (const i of empty) {
        board[i] = 'O';
        const s = minimax(board, 0, false, -Infinity, Infinity, maxDepth);
        board[i] = null;
        if (s > best) { best = s; move = i; }
      }
      return move;
    }

    function centerScore(i) {
      const r = Math.floor(i/SIZE), c = i%SIZE, mid = (SIZE-1)/2;
      return -(Math.abs(r-mid) + Math.abs(c-mid));
    }

    function minimax(b, depth, isMax, alpha, beta, maxDepth) {
      const r = checkWin(b);
      if (r) return r.winner==='O' ? 100-depth : depth-100;
      if (b.every(Boolean) || depth===maxDepth) return depth===maxDepth ? heuristic(b) : 0;

      const empty = b.map((v,i) => v==null ? i : null).filter(i => i!==null);
      if (isMax) {
        let best = -Infinity;
        for (const i of empty) {
          b[i]='O'; best = Math.max(best, minimax(b,depth+1,false,alpha,beta,maxDepth)); b[i]=null;
          alpha = Math.max(alpha, best);
          if (beta <= alpha) break;
        }
        return best;
      } else {
        let best = Infinity;
        for (const i of empty) {
          b[i]='X'; best = Math.min(best, minimax(b,depth+1,true,alpha,beta,maxDepth)); b[i]=null;
          beta = Math.min(beta, best);
          if (beta <= alpha) break;
        }
        return best;
      }
    }

    // Heuristic for 5×5 at depth limit: score open sequences
    function heuristic(b) {
      let score = 0;
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          for (const [dr,dc] of DIRS) {
            let oCount=0, xCount=0;
            for (let k=0; k<WIN_LEN; k++) {
              const nr=r+dr*k, nc=c+dc*k;
              if (nr<0||nr>=SIZE||nc<0||nc>=SIZE) { oCount=xCount=-1; break; }
              const v=b[nr*SIZE+nc];
              if (v==='O') oCount++; else if (v==='X') xCount++;
            }
            if (xCount===0 && oCount>0) score += Math.pow(10,oCount);
            if (oCount===0 && xCount>0) score -= Math.pow(10,xCount);
          }
        }
      }
      return score;
    }

    // ── Scores ─────────────────────────────────────────────────────────────
    function updateScores() {
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-d').textContent = scores.D;
    }

    init();
  </script>
</body>
</html>
